<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherTrip - Previsão do Tempo para sua Viagem</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌦️</text></svg>">


    <!-- SEO Básico -->
    <meta name="description"
        content="Planeje sua viagem com o WeatherTrip. Veja a previsão do tempo exata para cada ponto da sua rota e viaje com mais segurança.">
    <meta name="keywords"
        content="previsão do tempo, rota de viagem, clima na estrada, planejamento de viagem, meteorologia, clima interativo">
    <meta name="author" content="Vinicius do Canto">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://sites.docanto.net/weathertrip/" />

    <!-- Open Graph / Meta tags Sociais (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sites.docanto.net/weathertrip/">
    <meta property="og:title" content="WeatherTrip - Previsão do Tempo na sua Rota">
    <meta property="og:description"
        content="Planeje sua viagem e saiba exatamente como estará o clima em cada trecho do caminho. Evite surpresas na estrada!">
    <meta property="og:image" content="https://sites.docanto.net/weathertrip/assets/img/og-image.png">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="sites.docanto.net">
    <meta property="twitter:url" content="https://sites.docanto.net/weathertrip/">
    <meta name="twitter:title" content="WeatherTrip - Previsão do Tempo na sua Rota">
    <meta name="twitter:description"
        content="Planeje sua viagem e saiba exatamente como estará o clima em cada trecho do caminho.">
    <meta name="twitter:image" content="https://sites.docanto.net/weathertrip/assets/img/og-image.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="assets/css/style.min.css">
</head>

<body>

    <main>
        <div class="card">
            <h1>WeatherTrip</h1>

            <div class="form-row">
                <div class="form-group">
                    <label for="origin">Sair de:</label>
                    <input type="text" id="origin" placeholder="Origem..." autocomplete="off"
                        aria-label="Cidade de origem">
                    <div id="origin-list" class="autocomplete-list"></div>
                </div>

                <div class="form-group">
                    <label for="destination">Ir para:</label>
                    <input type="text" id="destination" placeholder="Destino..." autocomplete="off"
                        aria-label="Cidade de destino">
                    <div id="destination-list" class="autocomplete-list"></div>
                </div>
            </div>

            <div id="stops-container"></div>

            <div style="margin-bottom: 1.5rem; text-align: center;">
                <button type="button" class="btn-secondary" onclick="adicionarParada()">+ Adicionar Parada</button>
            </div>

            <div class="form-group">
                <label for="trip-date">Data e Hora da Partida:</label>
                <input type="datetime-local" id="trip-date" aria-label="Data e hora da partida">
            </div>

            <button onclick="calcularRota()">Ver Previsão e Mapa</button>

            <div id="map-container">
                <div id="map"></div>
                <div id="map-overlay">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div id="results" class="timeline" aria-live="polite"></div>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 WeatherTrip. <br>
            <a href="https://github.com/viniciusdocanto/weather-route-api" target="_blank"
                rel="noopener noreferrer">GitHub</a> |
            <a href="https://docanto.net" target="_blank" rel="noopener noreferrer">Vinicius do Canto</a> |
            <span id="app-version" style="font-weight: bold; color: #555;">...</span>
        </p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/script.min.js"></script>
</body>

</html>
