<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão de Rota</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h1>WeatherTrip</h1>

        <div class="form-row">
            <div class="form-group">
                <label>Sair de:</label>
                <input type="text" id="origin" placeholder="Origem..." autocomplete="off">
                <div id="origin-list" class="autocomplete-list"></div>
            </div>

            <div class="form-group">
                <label>Ir para:</label>
                <input type="text" id="destination" placeholder="Destino..." autocomplete="off">
                <div id="destination-list" class="autocomplete-list"></div>
            </div>
        </div>

        <div id="stops-container"></div>

        <div style="margin-bottom: 1.5rem; text-align: center;">
            <button type="button" class="btn-secondary" onclick="adicionarParada()">+ Adicionar Parada</button>
        </div>

        <div class="form-group">
            <label>Data e Hora da Partida:</label>
            <input type="datetime-local" id="trip-date">
        </div>

        <button onclick="calcularRota()">Ver Previsão e Mapa</button>

        <div id="map-container">
            <div id="map"></div>
            <div id="map-overlay">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div id="results" class="timeline"></div>

    <footer class="app-footer">
        <p>&copy; 2026 WeatherTrip. <br>
            <a href="https://github.com/viniciusdocanto/weather-route-api" target="_blank"
                rel="noopener noreferrer">Repositório GitHub</a> |
            <a href="https://docanto.net" target="_blank" rel="noopener noreferrer">Vinicius do Canto</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
