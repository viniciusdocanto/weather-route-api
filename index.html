<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão de Rota</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h1>WeatherTrip</h1>

        <div class="form-row">
            <div class="form-group">
                <label>Sair de:</label>
                <input type="text" id="origin" placeholder="Origem..." autocomplete="off">
                <div id="origin-list" class="autocomplete-list"></div>
            </div>

            <div class="form-group">
                <label>Ir para:</label>
                <input type="text" id="destination" placeholder="Destino..." autocomplete="off">
                <div id="destination-list" class="autocomplete-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Data e Hora da Partida:</label>
            <input type="datetime-local" id="trip-date">
        </div>

        <button onclick="calcularRota()">Ver Previsão e Mapa</button>

        <div id="map"></div>
    </div>

    <div id="results" class="timeline"></div>

    <script src="script.js"></script>
</body>

</html>
