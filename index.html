<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherTrip - Clima Interativo na Rota</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌦️</text></svg>">

    <!-- SEO -->
    <meta name="description"
        content="Planeje sua viagem com o WeatherTrip. Veja a previsão do tempo exata para cada ponto da sua rota e viaje com mais segurança.">
    <meta name="keywords"
        content="previsão do tempo, rota de viagem, clima na estrada, planejamento de viagem, meteorologia">
    <meta name="author" content="Vinicius do Canto">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://sites.docanto.net/weathertrip/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sites.docanto.net/weathertrip/">
    <meta property="og:title" content="WeatherTrip - Previsão do Tempo na sua Rota">
    <meta property="og:description"
        content="Planeje sua viagem e saiba exatamente como estará o clima em cada trecho do caminho.">
    <meta property="og:image" content="https://sites.docanto.net/weathertrip/assets/img/og-image.webp">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="sites.docanto.net">
    <meta property="twitter:url" content="https://sites.docanto.net/weathertrip/">
    <meta name="twitter:title" content="WeatherTrip - Previsão do Tempo na sua Rota">
    <meta name="twitter:description"
        content="Planeje sua viagem e saiba exatamente como estará o clima em cada trecho do caminho.">
    <meta name="twitter:image" content="https://sites.docanto.net/weathertrip/assets/img/og-image.webp">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- App CSS -->
    <link rel="stylesheet" href="assets/css/style.min.css?v=2">

    <!-- Dark mode: aplicar antes do render para evitar flash branco -->
    <script>
        (function () {
            const saved = localStorage.getItem('wt-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body
    class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Barra de navegação superior com toggle -->
    <nav
        class="flex items-center justify-between px-6 py-3 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-700/60">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🌦️</span>
            <span class="font-bold text-indigo-600 dark:text-indigo-400 text-lg">WeatherTrip</span>
        </div>

        <!-- Botão Dark Mode -->
        <button id="theme-toggle"
            class="flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-indigo-400">
            <span id="toggle-icon">☀️</span>
            <span id="toggle-label">Modo Escuro</span>
        </button>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col md:flex-row gap-8">

        <!-- Formulário (Esquerda) -->
        <div class="w-full md:w-[45%] lg:w-[40%] space-y-6">
            <div
                class="wt-card bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl shadow-xl rounded-3xl p-6 md:p-8 border border-white/50 dark:border-slate-700/50 relative overflow-hidden">
                <!-- Detalhe de gradiente decorativo -->
                <div
                    class="absolute -top-24 -right-24 w-48 h-48 bg-gradient-to-br from-indigo-500/20 to-teal-400/20 blur-2xl rounded-full pointer-events-none">
                </div>

                <div class="relative z-10 space-y-5">
                    <div>
                        <h2
                            class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-teal-500 mb-1">
                            Planeje sua viagem</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Clima inteligente em cada ponto da rota
                        </p>
                    </div>

                    <div class="relative">
                        <label for="origin"
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5 ml-1">Sair
                            de</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-slate-400 pointer-events-none">📍</span>
                            <input type="text" id="origin" placeholder="Cidade de origem..." autocomplete="off"
                                class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/50 rounded-2xl outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium text-slate-700 dark:text-slate-200">
                        </div>
                        <div id="origin-list"
                            class="autocomplete-list absolute z-50 w-full mt-2 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-100 dark:border-slate-700 max-h-60 overflow-y-auto hidden">
                        </div>
                    </div>

                    <div class="relative">
                        <label for="destination"
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5 ml-1">Ir
                            para</label>
                        <div class="relative">
                            <span class="absolute left-4 top-3.5 text-indigo-500 pointer-events-none">🏁</span>
                            <input type="text" id="destination" placeholder="Cidade de destino..." autocomplete="off"
                                class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/50 rounded-2xl outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium text-slate-700 dark:text-slate-200">
                        </div>
                        <div id="destination-list"
                            class="autocomplete-list absolute z-50 w-full mt-2 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-100 dark:border-slate-700 max-h-60 overflow-y-auto hidden">
                        </div>
                    </div>

                    <div id="stops-container" class="space-y-4"></div>

                    <div class="text-center">
                        <button type="button" onclick="adicionarParada()"
                            class="inline-flex items-center px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 hover:text-indigo-600 dark:hover:text-indigo-400 rounded-full transition-colors outline-none">
                            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4"></path>
                            </svg>
                            Adicionar Parada
                        </button>
                    </div>

                    <div>
                        <label for="trip-date"
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-1.5 ml-1">Partida</label>
                        <input type="datetime-local" id="trip-date"
                            class="w-full px-4 py-3.5 bg-slate-50/50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:border-indigo-400 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-900/50 rounded-2xl outline-none transition-all text-slate-700 dark:text-slate-200 font-medium cursor-pointer">
                    </div>

                    <button onclick="calcularRota()"
                        class="w-full mt-2 bg-gradient-to-r from-indigo-600 to-teal-500 hover:from-indigo-500 hover:to-teal-400 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-indigo-200/50 dark:shadow-indigo-900/50 transform transition-all active:scale-[0.98] outline-none focus:ring-4 focus:ring-indigo-200 dark:focus:ring-indigo-800 flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7">
                            </path>
                        </svg>
                        Calcular e Buscar Clima
                    </button>
                </div>
            </div>
        </div>

        <!-- Mapa e Resultados (Direita) -->
        <div class="w-full md:w-[55%] lg:w-[60%] flex flex-col gap-6">

            <!-- Mapa -->
            <div id="map-container"
                class="relative w-full h-[350px] md:h-[450px] bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden hidden transition-opacity duration-300">
                <div id="map" class="w-full h-full z-0"></div>
                <div id="map-overlay"
                    class="absolute inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
                    <div
                        class="w-12 h-12 border-4 border-indigo-100 dark:border-indigo-900 border-t-indigo-500 rounded-full animate-spin">
                    </div>
                    <span class="mt-4 text-indigo-800 dark:text-indigo-300 font-medium">Buscando clima
                        interativo...</span>
                </div>
            </div>

            <!-- Timeline / Placeholder -->
            <div id="results"
                class="bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm rounded-3xl border border-white dark:border-slate-700 p-4 sm:p-6"
                aria-live="polite">
                <div
                    class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-12 text-center">
                    <svg class="w-16 h-16 mb-4 text-slate-200 dark:text-slate-700" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                        </path>
                    </svg>
                    <p class="font-medium text-lg">Onde a viagem vai levar você hoje?</p>
                    <p class="text-sm mt-1">Preencha origem e destino para ver o tempo real.</p>
                </div>
            </div>

        </div>

    </main>

    <footer
        class="mt-auto py-6 text-center text-slate-500 dark:text-slate-400 text-sm border-t border-slate-200/60 dark:border-slate-700/60 bg-white/30 dark:bg-slate-900/30 backdrop-blur-md">
        <p class="font-medium">&copy; 2026 WeatherTrip</p>
        <p class="mt-1 space-x-3">
            <a href="https://github.com/viniciusdocanto/weather-route-api" target="_blank"
                class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors"
                rel="noopener noreferrer">GitHub</a>
            <span>&bull;</span>
            <a href="https://docanto.net" target="_blank"
                class="hover:text-teal-600 dark:hover:text-teal-400 transition-colors"
                rel="noopener noreferrer">Vinicius do Canto</a>
            <span>&bull;</span>
            <span id="app-version"
                class="text-slate-400 dark:text-slate-500 font-semibold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full text-xs">...</span>
        </p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/script.min.js?v=2"></script>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const toggleLabel = document.getElementById('toggle-label');

        function updateToggleUI() {
            const isDark = document.documentElement.classList.contains('dark');
            toggleIcon.textContent = isDark ? '🌙' : '☀️';
            toggleLabel.textContent = isDark ? 'Modo Claro' : 'Modo Escuro';
        }

        updateToggleUI();

        toggleBtn.addEventListener('click', function () {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('wt-theme', isDark ? 'dark' : 'light');
            updateToggleUI();
        });
    </script>
</body>

</html>
